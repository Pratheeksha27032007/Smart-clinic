<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartClinic — Patient Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:28rem;">
    <div class="auth-logo">
      <div class="auth-logo-icon">✚</div>
      <h1>Create Account</h1>
      <p>Patient registration — Doctors & Staff contact admin</p>
    </div>
    {% if error %}<div class="alert alert-danger">⚠️ {{ error }}</div>{% endif %}
    {% if success %}<div class="alert alert-success">✅ {{ success }} <a href="/login" style="color:var(--green);font-weight:600;">Login now →</a></div>{% endif %}
    <div class="role-badge role-patient" style="margin-bottom:1rem;">🧑 Patient Registration</div>
    <form action="/register" method="POST" class="auth-form">
      <div class="form-grid" style="gap:0.75rem;">
        <div class="form-group"><label>Full Name</label><input type="text" name="full_name" required placeholder="Your full name"></div>
        <div class="form-group"><label>Username</label><input type="text" name="username" required placeholder="Choose username"></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="your@email.com"></div>
        <div class="form-group"><label>Phone</label><input type="tel" name="phone" placeholder="+91 XXXXX XXXXX"></div>
        <div class="form-group"><label>Age</label><input type="number" name="age" min="1" max="120" placeholder="Your age"></div>
        <div class="form-group"><label>Blood Group</label>
          <select name="blood_group"><option value="">Select</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="Min 6 characters"></div>
      <button type="submit" class="btn btn-primary btn-full">Create Patient Account →</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="/login">Sign in →</a></div>
  </div>
</div>
</body>
</html>
